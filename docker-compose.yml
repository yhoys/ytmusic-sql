services:
  db:
    image: postgres:16
    container_name: ytmusic_db
    environment:
      POSTGRES_DB: ytmusic_sql
      POSTGRES_USER: ytmusic_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./sql/02_seed_data.sql:/docker-entrypoint-initdb.d/02_seed_data.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ytmusic_user -d ytmusic_sql"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: ytmusic_api
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ytmusic_sql
      DB_USER: ytmusic_user
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: ytmusic_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
